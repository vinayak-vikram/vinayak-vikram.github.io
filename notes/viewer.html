<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes — Vinayak Vikram</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div id="site-header"></div>

  <main>
    <div class="post-header" id="viewer-header"></div>
    <iframe class="pdf-viewer" id="pdf-frame" src=""></iframe>
  </main>

  <div id="site-footer"></div>
  <script src="../template.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var file = params.get('file');
      if (!file) { location.href = '/notes.html'; return; }
      document.getElementById('pdf-frame').src = file;
      var name = file.split('/').pop().replace(/\.pdf$/i, '').replace(/[_-]/g, ' ');
      document.getElementById('viewer-header').innerHTML = '<h1>' + name + '</h1>';
      document.title = name + ' \u2014 Vinayak Vikram';
    })();
  </script>
</body>
</html>
