name: Build posts.json and notes.json

on:
  push:
    branches:
      - main
    paths-ignore:
      - posts.json
      - notes.json

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run build script
        run: node build.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts.json notes.json
          git diff --staged --quiet || git commit -m "Update posts.json and notes.json" && git push
